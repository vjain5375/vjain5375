name: WakaTime Readme

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          
          # Sab kuch FALSE kar diya taaki text na aaye
          SHOW_OS: "False"
          SHOW_PROJECTS: "False"
          SHOW_EDITORS: "False"
          SHOW_TIMEZONE: "False"
          SHOW_COMMIT: "False"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_LOC_CHART: "False"
          SHOW_LINES_OF_CODE: "False"  # Yeh "My GitHub Data" hata dega
          SHOW_DAYS_OF_WEEK: "False"   # Yeh "Most Productive Day" hata dega
          SHOW_SHORT_INFO: "False"
          SHOW_PROFILE_VIEWS: "False"
          
          # Sirf yeh TRUE rakha hai
          SHOW_LANGUAGE: "True" 
          SHOW_TOTAL_CODE_TIME: "True" 
